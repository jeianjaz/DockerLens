# Horizontal Pod Autoscaler — automatically scales pods based on CPU usage
# If average CPU across pods exceeds 70%, K8s adds more pods (up to 5)
# If CPU drops, it scales back down (minimum 2)
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: dockerlens-app
  namespace: dockerlens
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: dockerlens-app
  minReplicas: 2                       # Always keep at least 2 pods
  maxReplicas: 5                       # Scale up to 5 pods max
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70       # Scale when avg CPU > 70%

# Auto-provision Prometheus as a data source in Grafana
# This means Grafana will already have Prometheus connected on first boot — no manual setup needed

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    uid: PBFA97CFB590B2093
    url: http://prometheus:9090    # "prometheus" = the service name in docker-compose
    isDefault: true
    editable: true

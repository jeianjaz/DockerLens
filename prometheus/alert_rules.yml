# Prometheus alerting rules for DockerLens
# These define WHEN to fire an alert based on metric conditions

groups:
  - name: dockerlens_alerts
    rules:
      # ALERT 1: High Error Rate
      # Fires when more than 10% of requests return 5xx for 1 minute
      - alert: HighErrorRate
        expr: |
          (
            sum(rate(http_requests_total{status=~"5.."}[1m]))
            /
            sum(rate(http_requests_total[1m]))
          ) * 100 > 10
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value | printf \"%.1f\" }}% (threshold: 10%)"

      # ALERT 2: High Latency
      # Fires when P95 latency exceeds 2 seconds for 2 minutes
      - alert: HighLatency
        expr: |
          histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le))
          > 2
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High latency detected"
          description: "P95 latency is {{ $value | printf \"%.2f\" }}s (threshold: 2s)"

      # ALERT 3: App Down
      # Fires when Prometheus can't reach the Flask app for 30 seconds
      - alert: AppDown
        expr: up{job="dockerlens"} == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "DockerLens app is down"
          description: "The dockerlens target has been unreachable for 30 seconds"
